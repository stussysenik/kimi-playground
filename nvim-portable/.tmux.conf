# ── Sane defaults ─────────────────────────────────────────────────────────────

# Use Ctrl+Space as prefix (easier than Ctrl+B)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Enable mouse (scroll, click panes, resize)
set -g mouse on

# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Faster escape (for vim)
set -sg escape-time 0

# Bigger scrollback
set -g history-limit 50000

# ── Splits (intuitive keys) ──────────────────────────────────────────────────

# | for vertical split, - for horizontal split (in current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# ── Navigate panes with vim keys ─────────────────────────────────────────────

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt + vim keys to switch panes WITHOUT prefix
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ── Resize panes ─────────────────────────────────────────────────────────────

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Window switching ─────────────────────────────────────────────────────────

# Alt + number to switch windows WITHOUT prefix
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# Shift + arrow to switch windows
bind -n S-Left previous-window
bind -n S-Right next-window

# ── Copy mode (vim style) ────────────────────────────────────────────────────

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# ── Status bar (minimal) ─────────────────────────────────────────────────────

set -g status-position top
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[default] "
set -g status-left-length 20
set -g status-right "#[fg=#a6adc8] %H:%M "
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[fg=#f9e2af,bold] #I:#W "

# ── Reload config ────────────────────────────────────────────────────────────

bind r source-file ~/.tmux.conf \; display "Config reloaded!"
